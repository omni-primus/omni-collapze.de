<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>
    <div class="module">
        <h1>{moduleTitle}</h1>
        <p>{moduleDescription}</p>

        <f:if condition="{pageId}">
            <p>
                <a class="btn btn-primary" href="{createSeriesUrl}">
                    {labels.createSeries}
                </a>
                <a class="btn btn-default" href="{listModuleUrl}">
                    {labels.openList}
                </a>
            </p>

            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>{labels.date}</th>
                        <th>{labels.opponent}</th>
                        <th>{labels.games}</th>
                        <th>{labels.actions}</th>
                    </tr>
                </thead>
                <tbody>
                    <f:if condition="{seriesList -> f:count()}">
                        <f:then>
                            <f:for each="{seriesList}" as="series">
                                <tr>
                                    <td><f:format.date format="d.m.Y">{series.scrimDate}</f:format.date></td>
                                    <td>{series.opponentTeamName}</td>
                                    <td>{series.numberOfGames}</td>
                                    <td>
                                        <a href="{f:be.uri.editRecord(uid: series.uid, table: 'tx_sitepackage_domain_model_scrimseries', returnUrl: returnUrl)}">
                                            {labels.edit}
                                        </a>
                                        |
                                        <a href="{f:be.uri.editRecord(uid: series.uid, table: 'tx_sitepackage_domain_model_scrimseries', returnUrl: returnUrl)}">
                                            {labels.manage}
                                        </a>
                                    </td>
                                </tr>
                            </f:for>
                        </f:then>
                        <f:else>
                            <tr>
                                <td colspan="4">
                                    {labels.empty}
                                </td>
                            </tr>
                        </f:else>
                    </f:if>
                </tbody>
            </table>
        <f:else>
            <p>{noPageMessage}</p>
        </f:else>
        </f:if>
    </div>
</html>
