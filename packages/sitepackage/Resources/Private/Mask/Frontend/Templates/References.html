<div class="d-grid grid-cols-1 grid-md-cols-2 grid-lg-cols-4 gap-5 references-container{f:if(condition: '{data.space_before_class}', then: ' space-before-{data.space_before_class}')}{f:if(condition: '{data.space_after_class}', then: ' space-after-{data.space_after_class}')}">
    <f:for each="{data.tx_mask_reference_item}" as="item">
        <f:if condition="{item.tx_mask_reference_item_link}">
            <f:then>
                <a href="{item.tx_mask_reference_item_link}" class="reference-card text-decoration-none d-block border-rounded-lg p-4 text-white shadow-lg overflow-hidden position-relative">
            </f:then>
            <f:else>
                <a class="reference-card text-decoration-none d-block border-rounded-lg p-4 text-white shadow-lg overflow-hidden position-relative">
            </f:else>
        </f:if>
            <div class="position-absolute inset-0 reference-card-background card-bg-{item.tx_mask_reference_item_color}"></div>
            <div class="position-relative z-10 d-flex flex-column align-items-center justify-content-center h-100">
                <div class="social-icon mb-2">
                    <i class="{item.tx_mask_reference_item_icon} xxl-icon text-white"></i>
                </div>
                <h3 class="text-xl font-weight-semibold mb-2">{item.tx_mask_reference_item_header}</h3>
                <p class="text-center fs-6">
                    {item.tx_mask_reference_item_description}
                </p>
            </div>
        </a>
    </f:for>
</div>
